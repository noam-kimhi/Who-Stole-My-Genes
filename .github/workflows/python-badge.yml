name: Update Python Badge

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get language stats and build badge JSON
        env:
          REPO: OrF8/Who-Stole-My-Genes
        run: |
          curl -s "https://api.github.com/repos/${REPO}/languages" > languages.json

          python <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("languages.json").read_text())

          total = sum(data.values())
          python_bytes = data.get("Python", 0)
          pct = 0 if total == 0 else round((python_bytes / total) * 100, 1)

          badge = {
              "schemaVersion": 1,
              "label": "Python",
              "message": f"{pct}%",
              "color": "3776AB"
          }

          Path("badges").mkdir(exist_ok=True)
          Path("badges/python-percentage.json").write_text(
              json.dumps(badge, indent=2)
          )
          PY

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update Python percentage badge"
          branch: "bot/update-python-badge"
          delete-branch: true
          title: "Update Python percentage badge"
          body: |
            Automated update of badges/python-percentage.json
