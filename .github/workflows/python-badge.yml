name: Update Python Badge

on:
  workflow_dispatch:
  
  push:
    branches:
      - main
    paths:
      - '**/*.py'
      - '**/*.ipynb'
      - '**/*.r'
      - '**/*.R'
      - '**/*.jl'
      - '**/*.c'
      - '**/*.h'
      - '**/*.cpp'
      - '**/*.hpp'
      - '**/*.cc'
      - '**/*.cxx'
      - '**/*.java'
      - '**/*.js'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.go'
      - '**/*.rs'
      - '**/*.php'
      - '**/*.swift'
      - '**/*.kt'
      - '**/*.scala'
      - '**/*.m'
      - '**/*.mm'
      - '**/*.cs'
      - '**/*.sh'
      - '**/*.sql'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get language stats and build badge JSON
        env:
          REPO: noam-kimhi/Who-Stole-My-Genes
        run: |
          curl -s "https://api.github.com/repos/${REPO}/languages" > languages.json

          python <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("languages.json").read_text())
          total = sum(data.values())
          python_bytes = data.get("Python", 0)
          pct = 0 if total == 0 else round((python_bytes / total) * 100, 1)

          badge = {
              "schemaVersion": 1,
              "label": "Python",
              "message": f"{pct}%",
              "color": "3776AB"
          }

          Path("badges").mkdir(exist_ok=True)
          Path("badges/python-percentage.json").write_text(json.dumps(badge, indent=2))
          PY

          rm -f languages.json

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update Python percentage badge"
          branch: "bot/update-python-badge"
          delete-branch: true
          title: "Update Python percentage badge"
          body: "Automated update of badges/python-percentage.json"

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --merge --auto --delete-branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
